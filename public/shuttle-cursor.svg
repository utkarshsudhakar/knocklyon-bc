<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <!-- Cork tip (hotspot is at the very tip ~3,3) -->
  <ellipse cx="8" cy="8" rx="4.5" ry="5.5" fill="#f4c430" stroke="#b8860b" stroke-width="1.2" transform="rotate(-45 8 8)"/>

  <!-- Shaft -->
  <line x1="11" y1="11" x2="24" y2="24" stroke="#c8902a" stroke-width="2" stroke-linecap="round"/>

  <!-- Feathers (6 lines fanning from shaft end) -->
  <line x1="24" y1="24" x2="36" y2="18" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="37" y2="23" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="36" y2="29" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="33" y2="34" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="29" y2="37" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="23" y2="37" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="18" y2="36" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Feather rim arc -->
  <path d="M36,18 Q37,21 37,23 Q37,26 36,29 Q34,32 33,34 Q31,36 29,37 Q26,38 23,37 Q21,37 18,36"
        fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Dark outline on cork for visibility on light backgrounds -->
  <ellipse cx="8" cy="8" rx="4.5" ry="5.5" fill="none" stroke="#333" stroke-width="0.6" transform="rotate(-45 8 8)"/>
  <!-- Dark outline on feathers -->
  <line x1="24" y1="24" x2="36" y2="18" stroke="#333" stroke-width="0.4" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="37" y2="23" stroke="#333" stroke-width="0.4" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="36" y2="29" stroke="#333" stroke-width="0.4" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="33" y2="34" stroke="#333" stroke-width="0.4" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="29" y2="37" stroke="#333" stroke-width="0.4" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="23" y2="37" stroke="#333" stroke-width="0.4" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="18" y2="36" stroke="#333" stroke-width="0.4" stroke-linecap="round"/>
</svg>
